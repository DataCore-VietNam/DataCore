name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for all jobs: they only need to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: Test py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check datacore/
      - name: Run test suite (offline assertions)
        # Live paid-endpoint assertions are skipped here because they need a
        # real X_API_KEY. The runner exercises every offline code path and
        # exits non-zero on any failure. Run the full suite locally with
        # X_API_KEY set -- see tests/README.md.
        run: python tests/test_extensive.py
      - name: Build distributions
        run: python -m build
      - name: Verify distributions
        run: twine check dist/*

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build twine
      - name: Build
        run: python -m build
      - name: Verify
        run: twine check dist/*
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
